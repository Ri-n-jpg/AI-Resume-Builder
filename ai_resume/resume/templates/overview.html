{% extends "base.html" %}
{% block content %}

<div class="container">

  <h2 class="fw-bold mb-4">📊 Overview</h2>

  <!-- STATS -->
  <div class="row g-4">

    <div class="col-md-4">
      <div class="card shadow-sm p-3 text-center">
        <h5>Total Resumes</h5>
        <h2 class="text-primary">{{ total_resumes }}</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm p-3 text-center">
        <h5>This Month</h5>
        <h2 class="text-success">{{ monthly_resumes }}</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm p-3 text-center">
        <h5>Latest Resume</h5>
        <p class="text-muted mb-0">
          {{ last_resume.name }}
        </p>
      </div>
    </div>

  </div>

  <!-- QUICK ACTIONS -->
  <div class="mt-5">
    <h4 class="fw-bold mb-3">Quick Actions</h4>

    <a href="/create/" class="btn btn-primary me-2">➕ Create Resume</a>
    <a href="/dashboard/" class="btn btn-outline-primary">📄 View All</a>
  </div>

</div>

{% endblock %}
