{% extends "base.html" %}
{% block content %}

<div class="container" style="max-width: 500px;">

  <h2 class="fw-bold mb-4">🔐 Change Password</h2>

  <div class="card p-4 shadow-sm rounded-4">

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn btn-warning w-100 mt-3">
        Update Password
      </button>
    </form>

  </div>

</div>

{% endblock %}
