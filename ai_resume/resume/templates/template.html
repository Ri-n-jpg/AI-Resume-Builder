{% extends "base.html" %}
{% block content %}

<div class="container">

  <h2 class="fw-bold mb-4">🎨 Resume Templates</h2>

  <div class="row g-4">

    {% for t in templates %}

    <div class="col-md-4">

      <div class="card shadow-sm p-3 h-100">

        <!-- TITLE -->
        <h5 class="fw-bold">{{ t.name }}</h5>

        <!-- DESCRIPTION -->
        <p class="text-muted">{{ t.desc }}</p>

        <!-- PREVIEW BOX -->
        <div class="border p-3 bg-light mb-3" style="min-height: 80px;">
          <small class="text-muted">Preview</small>
          <p class="mb-0 mt-1">
            ATS optimized professional layout
          </p>
        </div>

        <!-- BUTTON -->
        <a href="/create/?template={{ t.id }}" class="btn btn-primary w-100">
          Use Template
        </a>

      </div>

    </div>

    {% endfor %}

  </div>

</div>

{% endblock %}
