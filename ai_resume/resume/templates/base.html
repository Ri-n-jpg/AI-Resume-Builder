<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="/">AI Resume</a>

    <div class="ms-auto">

      {% if user.is_authenticated %}

        <a href="/dashboard/" class="btn btn-outline-light me-2">Dashboard</a>
        <a href="/create/" class="btn btn-primary me-2">Create Resume</a>
        <a href="/logout/" class="btn btn-danger">Logout</a>

      {% else %}

        <a href="/" class="btn btn-outline-light me-2">Home</a>
        <a href="/template/" class="btn btn-warning me-2">Templates</a>
        <a href="/login/" class="btn btn-success me-2">Sign In</a>
        <a href="/signup/" class="btn btn-primary me-2">Sign Up</a>

      {% endif %}

    </div>

  </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
