{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-2 bg-light min-vh-100 p-3">

      <h5 class="mb-4">Menu</h5>

      <ul class="nav flex-column">

        <li class="nav-item mb-2">
          <a class="nav-link" href="#">Overview</a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link active" href="/dashboard/">My Resumes</a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link" href="#">Templates</a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link" href="#">Settings</a>
        </li>

      </ul>

    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-10 p-4">

      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">My Resumes</h2>

        <a href="/create/" class="btn btn-primary">
          + Create Resume
        </a>
      </div>

      <!-- Resume Cards -->
      <div class="row">

        {% for resume in resumes %}
        <div class="col-md-4">

          <div class="card mb-4 shadow-sm">
            <div class="card-body">

              <h5 class="card-title">{{ resume.name }}</h5>
              <p class="text-muted">{{ resume.email }}</p>

              <div class="d-flex justify-content-between">
                <a href="/edit/{{ resume.id }}/" class="btn btn-sm btn-outline-primary">
                  Edit
                </a>

                <a href="/preview/{{ resume.id }}/" class="btn btn-sm btn-outline-success">
                  Preview
                </a>
              </div>

            </div>
          </div>

        </div>

        {% empty %}
        <div class="text-center mt-5">
          <h4>No resumes yet</h4>
          <a href="/create/" class="btn btn-primary mt-3">
            Create Your First Resume
          </a>
        </div>
        {% endfor %}

      </div>

    </div>

  </div>
</div>

{% endblock %}
